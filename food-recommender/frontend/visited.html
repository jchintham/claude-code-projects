<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crave — My Restaurants</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="app-shell">
  <nav class="topbar">
    <div class="topbar-brand">
      <span class="icon">🍴</span>
      <span>Crave<span style="color:var(--orange)">.</span></span>
    </div>
    <div class="topbar-nav">
      <a href="/recommend.html" class="btn btn-ghost">Find restaurants</a>
      <a href="/visited.html" class="btn btn-ghost active">My restaurants</a>
      <a href="/profile.html" class="btn btn-ghost">Profile</a>
      <button class="btn btn-ghost" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <main class="page-content">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px;">
      <div>
        <h2>My Restaurants</h2>
        <p style="color:var(--text-muted);font-size:14px;margin-top:4px;">Places you've logged or want to remember.</p>
      </div>
      <button class="btn btn-primary" style="width:auto;" onclick="showAddModal()">+ Add a restaurant</button>
    </div>

    <div id="visited-list"></div>
  </main>

  <!-- Add restaurant modal -->
  <div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center;padding:20px;">
    <div style="background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:28px;width:100%;max-width:460px;">
      <h3 style="margin-bottom:18px;">Add a restaurant</h3>

      <div class="form-group" style="position:relative;">
        <label>Search restaurant *</label>
        <input type="text" id="add-name" placeholder="Start typing a restaurant name…" autocomplete="off" />
        <input type="hidden" id="add-place-id" />
        <div id="autocomplete-dropdown" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--card-raised);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-lg);z-index:300;margin-top:4px;max-height:220px;overflow-y:auto;"></div>
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" id="add-address" placeholder="Auto-filled when you select a restaurant" readonly style="color:var(--text-muted);" />
      </div>
      <div class="form-group">
        <label>Your rating <span style="font-weight:400;color:var(--text-muted)">(optional)</span></label>
        <div id="star-picker" style="display:flex;gap:6px;font-size:28px;cursor:pointer;">
          <span data-val="1">☆</span>
          <span data-val="2">☆</span>
          <span data-val="3">☆</span>
          <span data-val="4">☆</span>
          <span data-val="5">☆</span>
        </div>
      </div>
      <div class="form-group">
        <label>Would you go back?</label>
        <div style="display:flex;gap:10px;margin-top:6px;">
          <button class="btn btn-outline btn-sm" id="return-yes" onclick="setReturn(true)">Yes</button>
          <button class="btn btn-outline btn-sm" id="return-no" onclick="setReturn(false)">No</button>
          <button class="btn btn-ghost btn-sm" id="return-null" onclick="setReturn(null)">Not sure</button>
        </div>
      </div>
      <div class="form-group">
        <label>Notes <span style="font-weight:400;color:var(--text-muted)">(optional)</span></label>
        <input type="text" id="add-notes" placeholder="Favourite dish, occasion, who you went with…" />
      </div>

      <div style="display:flex;gap:10px;margin-top:20px;">
        <button class="btn btn-primary" style="flex:1;" onclick="saveRestaurant()">Save</button>
        <button class="btn btn-outline" onclick="hideModal()">Cancel</button>
      </div>
      <p class="error-msg" id="modal-error"></p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (!requireAuth()) throw new Error('redirect');

    let selectedRating = null;
    let wouldReturn = null;
    let editingPlaceId = null;
    let autocompleteTimer = null;

    // Custom autocomplete backed by our API
    function initAutocomplete() {
      const input = document.getElementById('add-name');
      const dropdown = document.getElementById('autocomplete-dropdown');

      input.addEventListener('input', () => {
        clearTimeout(autocompleteTimer);
        const val = input.value.trim();
        if (val.length < 2) { dropdown.style.display = 'none'; return; }

        autocompleteTimer = setTimeout(async () => {
          try {
            const results = await apiFetch(`/autocomplete?input=${encodeURIComponent(val)}`);
            if (!results.length) { dropdown.style.display = 'none'; return; }

            dropdown.innerHTML = results.map((r, i) => `
              <div data-index="${i}" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);font-size:14px;"
                onmousedown="selectSuggestion(${i})"
                onmouseenter="this.style.background='var(--card)'"
                onmouseleave="this.style.background=''">
                <div style="font-weight:600;color:var(--text);">${r.name}</div>
                ${r.address ? `<div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${r.address}</div>` : ''}
              </div>
            `).join('');
            dropdown._suggestions = results;
            dropdown.style.display = 'block';
          } catch { dropdown.style.display = 'none'; }
        }, 300);
      });

      input.addEventListener('blur', () => {
        setTimeout(() => { dropdown.style.display = 'none'; }, 150);
      });
    }

    function selectSuggestion(index) {
      const dropdown = document.getElementById('autocomplete-dropdown');
      const suggestion = dropdown._suggestions?.[index];
      if (!suggestion) return;
      document.getElementById('add-name').value = suggestion.name;
      document.getElementById('add-address').value = suggestion.address;
      document.getElementById('add-place-id').value = suggestion.place_id;
      dropdown.style.display = 'none';
    }

    // Star picker
    const starSpans = document.querySelectorAll('#star-picker span');
    starSpans.forEach(s => {
      s.addEventListener('click', () => {
        selectedRating = parseInt(s.dataset.val);
        starSpans.forEach((sp, i) => sp.textContent = i < selectedRating ? '★' : '☆');
      });
    });

    function setReturn(val) {
      wouldReturn = val;
      document.getElementById('return-yes').style.cssText = val === true ? 'background:var(--orange);color:white;' : '';
      document.getElementById('return-no').style.cssText = val === false ? 'background:var(--orange);color:white;' : '';
      document.getElementById('return-null').style.cssText = val === null ? 'background:var(--border);' : '';
    }

    function showAddModal(restaurant = null) {
      editingPlaceId = restaurant?.place_id || null;
      document.getElementById('add-name').value = restaurant?.name || '';
      document.getElementById('add-address').value = restaurant?.address || '';
      document.getElementById('add-place-id').value = restaurant?.place_id || '';
      document.getElementById('add-notes').value = restaurant?.notes || '';
      document.getElementById('modal-error').textContent = '';
      selectedRating = restaurant?.rating || null;
      wouldReturn = restaurant?.would_return ?? null;
      starSpans.forEach((sp, i) => sp.textContent = i < (selectedRating || 0) ? '★' : '☆');
      setReturn(wouldReturn);
      document.getElementById('modal-overlay').style.display = 'flex';
    }

    function hideModal() {
      document.getElementById('modal-overlay').style.display = 'none';
      editingPlaceId = null;
      document.getElementById('add-place-id').value = '';
      document.getElementById('add-name').value = '';
      document.getElementById('autocomplete-dropdown').style.display = 'none';
    }

    async function saveRestaurant() {
      const name = document.getElementById('add-name').value.trim();
      const errorEl = document.getElementById('modal-error');
      if (!name) { errorEl.textContent = 'Restaurant name is required.'; return; }

      const placeId = document.getElementById('add-place-id').value || editingPlaceId || `manual-${Date.now()}`;
      try {
        await apiFetch('/visited', {
          method: 'POST',
          body: JSON.stringify({
            place_id: placeId,
            name,
            address: document.getElementById('add-address').value.trim(),
            rating: selectedRating,
            notes: document.getElementById('add-notes').value.trim(),
            would_return: wouldReturn
          })
        });
        hideModal();
        loadVisited();
      } catch (err) {
        errorEl.textContent = err.message;
      }
    }

    async function removeRestaurant(placeId) {
      if (!confirm('Remove this restaurant from your list?')) return;
      await apiFetch(`/visited/${encodeURIComponent(placeId)}`, { method: 'DELETE' });
      loadVisited();
    }

    async function loadVisited() {
      const list = document.getElementById('visited-list');
      list.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      try {
        const restaurants = await apiFetch('/visited');
        if (!restaurants.length) {
          list.innerHTML = `
            <div class="empty-state">
              <div class="icon">📖</div>
              <h3>No restaurants yet</h3>
              <p>Add places you've been to, or click "+ I've been here" on any recommendation.</p>
            </div>`;
          return;
        }
        list.innerHTML = restaurants.map(r => `
          <div class="profile-section" style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;">
            <div style="flex:1;">
              <div style="font-size:17px;font-weight:700;">${r.name}</div>
              ${r.address ? `<div style="font-size:13px;color:var(--text-muted);margin-top:3px;">📍 ${r.address}</div>` : ''}
              <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;align-items:center;">
                ${r.rating ? `<span style="color:#f59e0b;font-size:16px;">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>` : ''}
                ${r.would_return === true ? `<span class="badge badge-green">Would return</span>` : r.would_return === false ? `<span class="badge badge-gray">Wouldn't return</span>` : ''}
                <span style="font-size:12px;color:var(--text-muted);">${new Date(r.visited_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
              </div>
              ${r.notes ? `<div style="font-size:14px;color:#57534e;margin-top:8px;font-style:italic;">"${r.notes}"</div>` : ''}
            </div>
            <div style="display:flex;gap:6px;flex-shrink:0;">
              <button class="btn btn-ghost btn-sm" onclick='showAddModal(${JSON.stringify(r)})'>Edit</button>
              <button class="btn btn-ghost btn-sm" style="color:var(--red);" onclick="removeRestaurant('${r.place_id}')">Remove</button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        list.innerHTML = `<p class="error-msg">${err.message}</p>`;
      }
    }

    document.getElementById('modal-overlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) hideModal();
    });

    initAutocomplete();
    loadVisited();
  </script>
</body>
</html>
