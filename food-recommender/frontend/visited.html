<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crave — My Restaurants</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body.app-shell { overflow: hidden; }
    .map-layout {
      display: flex;
      height: calc(100vh - 60px);
      overflow: hidden;
    }
    .map-panel-left {
      width: 420px;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    .map-panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .map-panel-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    .map-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .map-card:hover { border-color: #3d3a36; }
    .map-card.active { border-color: var(--orange); box-shadow: 0 0 0 2px rgba(249,115,22,0.15); }
    #map-panel-right { flex: 1; }
    @media (max-width: 700px) {
      body.app-shell { overflow: auto; }
      .map-layout { flex-direction: column; height: auto; }
      .map-panel-left { width: 100%; height: auto; max-height: 60vh; }
      #map-panel-right { height: 50vh; }
    }
  </style>
</head>
<body class="app-shell">
  <nav class="topbar">
    <div class="topbar-brand">
      <span class="icon">🍴</span>
      <span>Crave<span style="color:var(--orange)">.</span></span>
    </div>
    <div class="topbar-nav">
      <a href="/recommend.html" class="btn btn-ghost">Find places</a>
      <a href="/visited.html" class="btn btn-ghost active">My places</a>
      <a href="/profile.html" class="btn btn-ghost" id="greeting">Profile</a>
      <button class="btn btn-ghost" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <div class="map-layout">
    <!-- Left panel: restaurant list -->
    <div class="map-panel-left">
      <div class="map-panel-header">
        <div>
          <h2 style="font-size:18px;font-weight:700;">My Places</h2>
          <p style="font-size:13px;color:var(--text-muted);margin-top:2px;">Places you've logged or want to remember.</p>
        </div>
        <button class="btn btn-primary" style="width:auto;padding:9px 16px;font-size:13px;white-space:nowrap;" onclick="showAddModal()">+ Add</button>
      </div>
      <div id="visited-list" class="map-panel-list"></div>
    </div>

    <!-- Right panel: map -->
    <div id="map-panel-right"></div>
  </div>

  <!-- Add / Edit restaurant modal -->
  <div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center;padding:20px;">
    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:28px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;">
      <h3 style="margin-bottom:18px;" id="modal-title">Add a place</h3>

      <div class="form-group">
        <label>Category</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button type="button" class="cat-btn" data-value="dining" onclick="selectCategory('dining')" style="padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card-raised);font-size:13px;cursor:pointer;color:var(--text-muted);">🍽️ Dining</button>
          <button type="button" class="cat-btn" data-value="bars"   onclick="selectCategory('bars')"   style="padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card-raised);font-size:13px;cursor:pointer;color:var(--text-muted);">🍸 Bars</button>
          <button type="button" class="cat-btn" data-value="coffee" onclick="selectCategory('coffee')" style="padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card-raised);font-size:13px;cursor:pointer;color:var(--text-muted);">☕ Coffee & Tea</button>
          <button type="button" class="cat-btn" data-value="bakery" onclick="selectCategory('bakery')" style="padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card-raised);font-size:13px;cursor:pointer;color:var(--text-muted);">🧁 Bakery & Desserts</button>
        </div>
      </div>

      <div class="form-group" style="position:relative;">
        <label>Search place *</label>
        <input type="text" id="add-name" placeholder="Start typing a name…" autocomplete="off" />
        <div style="font-size:12px;color:var(--text-muted);margin-top:5px;">Select from the dropdown, or just type the name and click Save if it doesn't appear.</div>
        <input type="hidden" id="add-place-id" />
        <div id="autocomplete-dropdown" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--card-raised);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-lg);z-index:300;margin-top:4px;max-height:220px;overflow-y:auto;"></div>
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" id="add-address" placeholder="Auto-filled when you select a restaurant" readonly style="color:var(--text-muted);" />
      </div>
      <div class="form-group">
        <label>Your rating <span style="font-weight:400;color:var(--text-muted)">(optional)</span></label>
        <div id="star-picker" style="display:flex;gap:6px;font-size:28px;cursor:pointer;">
          <span data-val="1">☆</span><span data-val="2">☆</span><span data-val="3">☆</span><span data-val="4">☆</span><span data-val="5">☆</span>
        </div>
      </div>
      <div class="form-group">
        <label>Would you go back?</label>
        <div style="display:flex;gap:10px;margin-top:6px;">
          <button class="btn btn-outline btn-sm" id="return-yes" onclick="setReturn(true)">Yes</button>
          <button class="btn btn-outline btn-sm" id="return-no" onclick="setReturn(false)">No</button>
          <button class="btn btn-ghost btn-sm" id="return-null" onclick="setReturn(null)">Not sure</button>
        </div>
      </div>
      <div class="form-group">
        <label>Notes <span style="font-weight:400;color:var(--text-muted)">(optional)</span></label>
        <input type="text" id="add-notes" placeholder="Favourite dish, occasion, who you went with…" />
      </div>

      <div style="display:flex;gap:10px;margin-top:20px;">
        <button class="btn btn-primary" style="flex:1;" onclick="saveRestaurant()">Save</button>
        <button class="btn btn-outline" onclick="hideModal()">Cancel</button>
      </div>
      <p class="error-msg" id="modal-error"></p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (!requireAuth()) throw new Error('redirect');
    document.getElementById('greeting').textContent = `Hi, ${getUserName()}`;

    const CATEGORY_STYLE = {
      dining: { bg: '#1a0a00', border: '#3d1f00', text: '#f97316', pin: '#f97316', label: '🍽️ Dining' },
      bars:   { bg: '#051520', border: '#0369a1', text: '#38bdf8', pin: '#38bdf8', label: '🍸 Bar'    },
      coffee: { bg: '#1c1000', border: '#451a03', text: '#fbbf24', pin: '#fbbf24', label: '☕ Coffee & Tea'       },
      bakery: { bg: '#1f0a18', border: '#500724', text: '#f472b6', pin: '#f472b6', label: '🧁 Bakery & Desserts' }
    };

    let visitedRestaurants = [];
    let selectedRating = null;
    let wouldReturn = null;
    let editingPlaceId = null;
    let selectedCategory = 'dining';
    let autocompleteTimer = null;
    let map = null;
    let geocoder = null;
    let infoWindow = null;
    let markers = {};

    const DARK_MAP_STYLE = [
      { elementType: 'geometry', stylers: [{ color: '#212121' }] },
      { elementType: 'labels.text.stroke', stylers: [{ color: '#212121' }] },
      { elementType: 'labels.text.fill', stylers: [{ color: '#746855' }] },
      { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#38414e' }] },
      { featureType: 'road', elementType: 'labels.text.fill', stylers: [{ color: '#9ca5b3' }] },
      { featureType: 'road.highway', elementType: 'geometry', stylers: [{ color: '#746855' }] },
      { featureType: 'road.highway', elementType: 'labels.text.fill', stylers: [{ color: '#f3d19c' }] },
      { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#17263c' }] },
      { featureType: 'water', elementType: 'labels.text.fill', stylers: [{ color: '#515c6d' }] },
      { featureType: 'poi', elementType: 'geometry', stylers: [{ color: '#2f3948' }] },
      { featureType: 'poi.park', elementType: 'geometry', stylers: [{ color: '#263c3f' }] },
      { featureType: 'transit', elementType: 'geometry', stylers: [{ color: '#2f3948' }] },
      { featureType: 'administrative', elementType: 'geometry', stylers: [{ color: '#757575' }] },
      { featureType: 'administrative.locality', elementType: 'labels.text.fill', stylers: [{ color: '#d59563' }] },
    ];

    // ── Load Maps JS dynamically ──
    async function initPage() {
      try {
        const { googleApiKey } = await apiFetch('/config');
        await new Promise((resolve, reject) => {
          window._mapsReady = resolve;
          const script = document.createElement('script');
          script.src = `https://maps.googleapis.com/maps/api/js?key=${googleApiKey}&callback=_mapsReady`;
          script.onerror = reject;
          document.head.appendChild(script);
        });
        map = new google.maps.Map(document.getElementById('map-panel-right'), {
          center: { lat: 38.9072, lng: -77.0369 },
          zoom: 12,
          styles: DARK_MAP_STYLE,
          mapTypeControl: false,
          streetViewControl: false,
          fullscreenControl: true,
        });
        geocoder = new google.maps.Geocoder();
        infoWindow = new google.maps.InfoWindow();
      } catch (err) {
        console.error('Maps failed to load:', err);
      }
      loadVisited();
    }

    // ── Restaurant list ──
    function starsHtml(rating) {
      if (!rating) return '';
      return '★'.repeat(rating) + '☆'.repeat(5 - rating);
    }

    const CAT_NORMALIZE = { bar: 'bars', cafe: 'coffee', restaurant: 'dining' };
    function normalizeCategory(c) { return CAT_NORMALIZE[c] || c || 'dining'; }

    function renderCard(r, i) {
      const cat = CATEGORY_STYLE[normalizeCategory(r.category)] || CATEGORY_STYLE.dining;
      return `
        <div class="map-card" id="mcard-${i}" onclick="focusCard(${i})">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
            <div style="flex:1;min-width:0;">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                <div style="font-weight:700;font-size:15px;line-height:1.3;">${r.name}</div>
                <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:${cat.bg};border:1px solid ${cat.border};color:${cat.text};white-space:nowrap;">${cat.label}</span>
              </div>
              ${r.address ? `<div style="font-size:12px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">📍 ${r.address}</div>` : ''}
              <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;align-items:center;">
                ${r.rating ? `<span style="color:#f59e0b;font-size:13px;">${starsHtml(r.rating)}</span>` : ''}
                ${r.would_return === true ? `<span class="badge badge-green" style="font-size:11px;">Would return</span>` : r.would_return === false ? `<span class="badge badge-gray" style="font-size:11px;">Wouldn't return</span>` : ''}
                <span style="font-size:11px;color:var(--text-muted);">${new Date(r.visited_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
              </div>
              ${r.notes ? `<div style="font-size:12px;color:#57534e;margin-top:4px;font-style:italic;">"${r.notes}"</div>` : ''}
            </div>
            <div style="display:flex;gap:4px;flex-shrink:0;">
              <button class="btn btn-ghost btn-sm" style="padding:5px 10px;" onclick="event.stopPropagation();editRestaurant(${i})">Edit</button>
              <button class="btn btn-ghost btn-sm" style="padding:5px 10px;color:var(--red);" onclick="event.stopPropagation();removeRestaurant('${r.place_id}')">✕</button>
            </div>
          </div>
        </div>`;
    }

    function placeMarker(r, index, position) {
      const marker = new google.maps.Marker({
        position,
        map,
        title: r.name,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          fillColor: (CATEGORY_STYLE[normalizeCategory(r.category)] || CATEGORY_STYLE.dining).pin,
          fillOpacity: 1,
          strokeColor: '#ffffff',
          strokeWeight: 2,
          scale: 9
        }
      });

      marker.addListener('click', () => {
        highlightCard(index);
        infoWindow.setContent(`
          <div style="font-family:system-ui,sans-serif;padding:4px 2px;max-width:200px;">
            <div style="font-weight:700;font-size:14px;color:#1a1a1a;margin-bottom:3px;">${r.name}</div>
            ${r.rating ? `<div style="color:#d97706;font-size:13px;margin-bottom:2px;">${starsHtml(r.rating)} ${r.rating}/5</div>` : ''}
            ${r.address ? `<div style="font-size:12px;color:#555;line-height:1.4;">${r.address}</div>` : ''}
          </div>`);
        infoWindow.open(map, marker);
      });

      markers[index] = marker;
    }

    function highlightCard(index) {
      document.querySelectorAll('.map-card').forEach(c => c.classList.remove('active'));
      const card = document.getElementById(`mcard-${index}`);
      if (card) {
        card.classList.add('active');
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    function focusCard(index) {
      highlightCard(index);
      if (map && markers[index]) {
        map.panTo(markers[index].getPosition());
        map.setZoom(15);
        google.maps.event.trigger(markers[index], 'click');
      }
    }

    function fitMap() {
      const positions = Object.values(markers).map(m => m.getPosition()).filter(Boolean);
      if (!positions.length) return;
      if (positions.length === 1) { map.setCenter(positions[0]); map.setZoom(15); return; }
      const bounds = new google.maps.LatLngBounds();
      positions.forEach(p => bounds.extend(p));
      map.fitBounds(bounds);
    }

    async function loadVisited() {
      const listEl = document.getElementById('visited-list');
      listEl.innerHTML = '<div class="loading" style="padding:30px 20px;"><div class="spinner"></div></div>';
      try {
        const restaurants = await apiFetch('/visited');
        visitedRestaurants = restaurants;

        // Clear old markers
        Object.values(markers).forEach(m => m.setMap(null));
        markers = {};

        if (!restaurants.length) {
          listEl.innerHTML = `
            <div class="empty-state" style="padding:40px 20px;">
              <div class="icon">📖</div>
              <h3>No restaurants yet</h3>
              <p>Add places you've been to, or click "+ I've been here" on any recommendation.</p>
            </div>`;
          return;
        }

        listEl.innerHTML = restaurants.map((r, i) => renderCard(r, i)).join('');

        // Geocode and place markers
        if (map && geocoder) {
          restaurants.forEach((r, i) => {
            const query = r.address || r.name;
            if (!query) return;
            geocoder.geocode({ address: query }, (results, status) => {
              if (status === 'OK' && results[0]) {
                placeMarker(r, i, results[0].geometry.location);
                if (i === restaurants.length - 1) setTimeout(fitMap, 500);
              }
            });
          });
        }
      } catch (err) {
        listEl.innerHTML = `<p class="error-msg" style="padding:20px;">${err.message}</p>`;
      }
    }

    // ── Modal ──
    const starSpans = document.querySelectorAll('#star-picker span');
    starSpans.forEach(s => {
      s.addEventListener('click', () => {
        selectedRating = parseInt(s.dataset.val);
        starSpans.forEach((sp, i) => sp.textContent = i < selectedRating ? '★' : '☆');
      });
    });

    function setReturn(val) {
      wouldReturn = val;
      document.getElementById('return-yes').style.cssText = val === true ? 'background:var(--orange);color:white;border-color:var(--orange);' : '';
      document.getElementById('return-no').style.cssText = val === false ? 'background:var(--orange);color:white;border-color:var(--orange);' : '';
      document.getElementById('return-null').style.cssText = val === null ? 'background:var(--border);' : '';
    }

    function selectCategory(val) {
      selectedCategory = val;
      document.querySelectorAll('.cat-btn').forEach(btn => {
        const cat = CATEGORY_STYLE[btn.dataset.value] || CATEGORY_STYLE.dining;
        const active = btn.dataset.value === val;
        btn.style.background = active ? cat.bg : 'var(--card-raised)';
        btn.style.borderColor = active ? cat.border : 'var(--border)';
        btn.style.color = active ? cat.text : 'var(--text-muted)';
      });
    }

    function showAddModal(restaurant = null) {
      editingPlaceId = restaurant?.place_id || null;
      document.getElementById('modal-title').textContent = restaurant ? 'Edit place' : 'Add a place';
      document.getElementById('add-name').value = restaurant?.name || '';
      document.getElementById('add-name').readOnly = !!restaurant;
      document.getElementById('add-address').value = restaurant?.address || '';
      document.getElementById('add-place-id').value = restaurant?.place_id || '';
      document.getElementById('add-notes').value = restaurant?.notes || '';
      document.getElementById('modal-error').textContent = '';
      selectedRating = restaurant?.rating || null;
      wouldReturn = restaurant?.would_return ?? null;
      selectCategory(restaurant?.category || 'dining');
      starSpans.forEach((sp, i) => sp.textContent = i < (selectedRating || 0) ? '★' : '☆');
      setReturn(wouldReturn);
      document.getElementById('modal-overlay').style.display = 'flex';
    }

    function editRestaurant(index) {
      showAddModal(visitedRestaurants[index]);
    }

    function hideModal() {
      document.getElementById('modal-overlay').style.display = 'none';
      editingPlaceId = null;
      document.getElementById('add-place-id').value = '';
      document.getElementById('add-name').value = '';
      document.getElementById('add-name').readOnly = false;
      document.getElementById('autocomplete-dropdown').style.display = 'none';
    }

    async function saveRestaurant() {
      const name = document.getElementById('add-name').value.trim();
      const errorEl = document.getElementById('modal-error');
      if (!name) { errorEl.textContent = 'Restaurant name is required.'; return; }
      const placeId = document.getElementById('add-place-id').value || editingPlaceId || `manual-${Date.now()}`;
      try {
        await apiFetch('/visited', {
          method: 'POST',
          body: JSON.stringify({
            place_id: placeId, name,
            address: document.getElementById('add-address').value.trim(),
            rating: selectedRating,
            notes: document.getElementById('add-notes').value.trim(),
            would_return: wouldReturn,
            category: selectedCategory
          })
        });
        hideModal();
        loadVisited();
      } catch (err) { errorEl.textContent = err.message; }
    }

    async function removeRestaurant(placeId) {
      if (!confirm('Remove this restaurant from your list?')) return;
      await apiFetch(`/visited/${encodeURIComponent(placeId)}`, { method: 'DELETE' });
      loadVisited();
    }

    // ── Autocomplete for restaurant search ──
    function initAutocomplete() {
      const input = document.getElementById('add-name');
      const dropdown = document.getElementById('autocomplete-dropdown');
      input.addEventListener('input', () => {
        if (input.readOnly) return;
        clearTimeout(autocompleteTimer);
        const val = input.value.trim();
        if (val.length < 2) { dropdown.style.display = 'none'; return; }
        autocompleteTimer = setTimeout(async () => {
          try {
            const results = await apiFetch(`/autocomplete?input=${encodeURIComponent(val)}`);
            if (!results.length) { dropdown.style.display = 'none'; return; }
            dropdown.innerHTML = results.map((r, i) => `
              <div style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);font-size:14px;"
                onmousedown="selectSuggestion(${i})"
                onmouseenter="this.style.background='var(--card)'"
                onmouseleave="this.style.background=''">
                <div style="font-weight:600;color:var(--text);">${r.name}</div>
                ${r.address ? `<div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${r.address}</div>` : ''}
              </div>`).join('');
            dropdown._suggestions = results;
            dropdown.style.display = 'block';
          } catch { dropdown.style.display = 'none'; }
        }, 300);
      });
      input.addEventListener('blur', () => setTimeout(() => { dropdown.style.display = 'none'; }, 150));
    }

    function selectSuggestion(index) {
      const dropdown = document.getElementById('autocomplete-dropdown');
      const s = dropdown._suggestions?.[index];
      if (!s) return;
      document.getElementById('add-name').value = s.name;
      document.getElementById('add-address').value = s.address;
      document.getElementById('add-place-id').value = s.place_id;
      dropdown.style.display = 'none';
    }

    document.getElementById('modal-overlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) hideModal();
    });

    initAutocomplete();
    initPage();
  </script>
</body>
</html>
